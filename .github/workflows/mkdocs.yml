name: MkDocs CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build MkDocs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build Documentation
        run: |
          mkdocs build --strict

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 7

      - name: Telegram - Build Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Build Success*
                      📦 Repository
                      ${{ github.repository }}

                      🌿 Branch
                      ${{ github.ref_name }}

                      👤 Actor
                      ${{ github.actor }}

                      📝 Commit
                      ${{ github.sha }}

                      💬 Message
                      ${{ github.event.head_commit.message }}

                      ⚙️ Workflow
                      ${{ github.workflow }}

                      🔗 Run URL
                      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

                      ⏰ Time
                      $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Telegram - Build Failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Build
                      📦 Repository
                      ${{ github.repository }}

                      🌿 Branch
                      ${{ github.ref_name }}

                      👤 Actor
                      ${{ github.actor }}

                      📝 Commit
                      ${{ github.sha }}

                      💬 Message
                      ${{ github.event.head_commit.message }}

                      ⚙️ Workflow
                      ${{ github.workflow }}

                      🔗 Run URL
                      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

                      ⏰ Time
                      $(date '+%Y-%m-%d %H:%M:%S')"

  deploy:
    name: Deploy MkDocs
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site/

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Register Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          rsync -az --delete \
            site/ \
            ${{ vars.USERNAME }}@${{ vars.HOST }}:/var/www/mkdocs/

      - name: Verify Deployment
        run: |
          ssh ${{ vars.USERNAME }}@${{ vars.HOST }} \
            "echo 'Deploy Success' && ls -lah /var/www/mkdocs | head"

      - name: Telegram - Deploy Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *Deploy Success*
          🌐 Site
          https://mkdocs.42hzs.com

          📦 Repository
          ${{ github.repository }}

          🌿 Branch
          ${{ github.ref_name }}

          👤 Actor
          ${{ github.actor }}

          📝 Commit
          ${{ github.sha }}

          💬 Message
          ${{ github.event.head_commit.message }}

          ⚙️ Workflow
          ${{ github.workflow }}

          🔗 Run URL
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ⏰ Time
          $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Telegram - Deploy Failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🔥 *Deploy Failed*
          🌐 Site
          https://mkdocs.42hzs.com

          📦 Repository
          ${{ github.repository }}

          🌿 Branch
          ${{ github.ref_name }}

          👤 Actor
          ${{ github.actor }}

          📝 Commit
          ${{ github.sha }}

          💬 Message
          ${{ github.event.head_commit.message }}

          ⚙️ Workflow
          ${{ github.workflow }}

          🔗 Run URL
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ⏰ Time
          $(date '+%Y-%m-%d %H:%M:%S')"